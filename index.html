<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>太陽系シミュレーター ✦ ケプラー軌道</title>
  <style>
    html, body {
      height: 100%;
      margin: 0;
      background: #000;
      overflow: hidden;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    
    canvas {
      display: block;
      width: 100%;
      height: 100%;
      cursor: crosshair;
    }
    
    #ui {
      position: fixed;
      top: 10px;
      left: 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      pointer-events: none;
    }
    
    #controls {
      position: fixed;
      bottom: 20px;
      left: 20px;
      display: flex;
      gap: 10px;
      background: rgba(20, 20, 30, 0.7);
      padding: 10px;
      border-radius: 8px;
      border: 1px solid rgba(100, 120, 255, 0.3);
      box-shadow: 0 0 15px rgba(70, 130, 240, 0.3);
      pointer-events: all;
    }
    
    button {
      background: rgba(60, 80, 170, 0.8);
      color: #fff;
      border: none;
      padding: 8px 12px;
      border-radius: 5px;
      cursor: pointer;
      transition: all 0.2s;
      font-weight: 500;
    }
    
    button:hover {
      background: rgba(80, 100, 220, 0.9);
      box-shadow: 0 0 8px rgba(120, 170, 255, 0.6);
    }
    
    .slider-container {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #cce;
    }
    
    input[type="range"] {
      accent-color: rgb(80, 120, 255);
    }
    
    #log {
      position: fixed;
      top: 10px;
      right: 10px;
      max-width: 340px;
      max-height: 90vh;
      overflow-y: auto;
      font: 12px/1.4 monospace;
      background: rgba(10, 10, 30, .7);
      color: #cce;
      border: 1px solid rgba(100, 120, 255, 0.3);
      padding: 8px 12px;
      border-radius: 8px;
      white-space: pre-line;
      pointer-events: none;
      box-shadow: 0 0 15px rgba(70, 130, 240, 0.3);
      transition: opacity 0.3s;
    }
    
    #log::-webkit-scrollbar {
      width: 5px;
    }
    
    #log::-webkit-scrollbar-thumb {
      background: rgba(100, 150, 255, 0.4);
      border-radius: 5px;
    }
    
    #stats {
      position: fixed;
      bottom: 10px;
      right: 10px;
      background: rgba(10, 10, 30, .7);
      color: #cce;
      border: 1px solid rgba(100, 120, 255, 0.3);
      padding: 8px 12px;
      border-radius: 8px;
      font: 12px/1.4 monospace;
      pointer-events: none;
      box-shadow: 0 0 15px rgba(70, 130, 240, 0.3);
    }
    
    .tooltip {
      position: absolute;
      background: rgba(20, 30, 60, 0.85);
      color: #fff;
      padding: 5px 10px;
      border-radius: 4px;
      font-size: 12px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
      border: 1px solid rgba(100, 150, 255, 0.4);
      z-index: 100;
    }
  </style>
</head>
<body>
  <canvas id="sim"></canvas>
  <div id="ui">
    <div id="controls">
      <button id="resetBtn">リセット</button>
      <button id="addPlanetBtn">惑星追加</button>
      <button id="addStarBtn">彗星追加</button>
      <button id="toggleTrailBtn">軌道表示</button>
      <div class="slider-container">
        <span>時間速度:</span>
        <input type="range" id="timeSpeed" min="0.1" max="3" step="0.1" value="1">
        <span id="timeValue">1.0 日/sec</span>
      </div>
      <div class="slider-container">
        <span>ズーム:</span>
        <input type="range" id="zoomLevel" min="0.2" max="2" step="0.1" value="1">
        <span id="zoomValue">1.0x</span>
      </div>
    </div>
  </div>
  <div id="log"></div>
  <div id="stats"></div>
  <div class="tooltip" id="tooltip"></div>

  <script type="text/plain">
    /*––––– CANVAS SETUP –––––*/
    const cvs = document.getElementById('sim');
    const ctx = cvs.getContext('2d');
    const DPR = window.devicePixelRatio || 1;
    let W, H, CX, CY;
    let scale = 1;
    let offsetX = 0, offsetY = 0; 
    let dragging = false;
    let lastMouseX, lastMouseY;
    
    function resize() {
      W = innerWidth;
      H = innerHeight;
      CX = W / 2;
      CY = H / 2;
      cvs.width = W * DPR;
      cvs.height = H * DPR;
      cvs.style.width = W + 'px';
      cvs.style.height = H + 'px';
      ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    }
    
    resize();
    addEventListener('resize', resize);
    
    const TAU = Math.PI * 2;
    const rand = (a, b) => Math.random() * (b - a) + a;
    const randInt = (a, b) => Math.floor(rand(a, b + 1));
    
    /*––––– CONFIG PARAMETERS –––––*/
    let config = {
      timeScale: 1,
      showTrails: true,
      zoomLevel: 1,
      gravitationalConstant: 0.00020,
      particleCount: {
        stars: 200
      },
      spawnRadius: {
        planets: 800
      },
      colors: {
        stars: ['#CCCCCC', '#BBBBBB', '#AAAAAA', '#999999', '#888888']
      }
    };

    /*––––– LOG PANEL –––––*/
    const logEl = document.getElementById('log');
    const logs = [];
    function addLog(msg) {
      const t = new Date().toLocaleTimeString('ja-JP', { hour12: false });
      logs.unshift(`[${t}] ${msg}`);
      if (logs.length > 60) logs.pop();
      logEl.textContent = logs.join('\n');
      logEl.scrollTop = 0;
    }
    
    /*––––– BACKGROUND VISUALS –––––*/
    // Background gradient
    function drawBackground() {
      const gradient = ctx.createRadialGradient(CX, CY, 0, CX, CY, Math.max(CX, CY) * 1.5);
      gradient.addColorStop(0, 'rgba(20, 20, 40, 1)');
      gradient.addColorStop(0.5, 'rgba(10, 10, 30, 1)');
      gradient.addColorStop(1, 'rgba(5, 5, 15, 1)');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, W, H);
    }
    
    // Distant stars with varying sizes, colors and brightness
    const bgStars = Array.from({ length: config.particleCount.stars }, () => ({
      x: rand(0, 1),
      y: rand(0, 1),
      r: rand(0.1, 1.0),
      a: rand(0.1, 0.6),
      color: config.colors.stars[randInt(0, config.colors.stars.length - 1)],
      ph: rand(0, TAU),
      s: rand(0.2, 1.2),
      twinkle: rand(0.01, 0.05)
    }));
    
    function drawBackgroundStars(time) {
      ctx.save();
      bgStars.forEach(s => {
        const a = s.a * (0.6 + 0.4 * Math.sin(time * 0.001 * s.s + s.ph));
        const size = s.r * (0.8 + 0.2 * Math.sin(time * s.twinkle + s.ph));
        
        // Star glow
        const glow = ctx.createRadialGradient(
          s.x * W, s.y * H, 0,
          s.x * W, s.y * H, size * 4
        );
        glow.addColorStop(0, s.color);
        glow.addColorStop(1, 'rgba(0,0,0,0)');
        
        ctx.globalAlpha = a * 0.1;
        ctx.fillStyle = glow;
        ctx.beginPath();
        ctx.arc(s.x * W, s.y * H, size * 4, 0, TAU);
        ctx.fill();
        
        // Star core
        ctx.globalAlpha = a * 0.8;
        ctx.fillStyle = s.color;
        ctx.beginPath();
        ctx.arc(s.x * W, s.y * H, size, 0, TAU);
        ctx.fill();
      });
      ctx.restore();
    }
    
    /*––––– GALAXY DISK –––––*/
    // 削除: 銀河系のディスクと塵は太陽系シミュレーターでは不要
    
    // 削除: drawGalaxyDisk関数は太陽系シミュレーターでは不要
    
    /*––––– PHYSICS SYSTEM –––––*/
    // 重力定数 G
    const G = config.gravitationalConstant;
    
    // 天体クラス
    class Body {
      constructor({name, color, mass, radius, x, y, vx, vy, type='planet', hasBelt = false}) {
        this.name = name;
        this.color = color;
        this.m = mass;
        this.r = radius;
        this.x = x;
        this.y = y;
        this.vx = vx || 0;
        this.vy = vy || 0;
        this.ax = 0;
        this.ay = 0;
        this.type = type;
        this.isFragment = !name;
        this.trail = [];
        this.trailMaxLength = 100;
        this.alive = true;
        this.created = Date.now();
        this.rings = [];
        
        // リングがある場合は生成
        if (hasBelt) {
          const ringCount = randInt(1, 3);
          for (let i = 0; i < ringCount; i++) {
            this.rings.push({
              innerRadius: this.r * (1.6 + i * 0.8) * rand(0.9, 1.1),
              outerRadius: this.r * (2.2 + i * 0.8) * rand(0.9, 1.1),
              color: `hsla(${rand(20, 60)}, ${rand(40, 70)}%, ${rand(70, 90)}%, ${rand(0.4, 0.7)})`
            });
          }
        }
        
        // 恒星の場合は光のフレアを追加
        if (type === 'star') {
          this.flares = Array(randInt(3, 6)).fill().map(() => ({
            angle: rand(0, TAU),
            length: rand(1.5, 3) * radius,
            width: rand(0.3, 0.7) * radius,
            phase: rand(0, TAU)
          }));
        }
      }
      
      // 位置を更新（リープフロッグ積分法）
      update(dt) {
        // 半分のステップでの速度更新
        this.vx += this.ax * dt * 0.5 * config.timeScale;
        this.vy += this.ay * dt * 0.5 * config.timeScale;
        
        // 位置の更新
        this.x += this.vx * dt * config.timeScale;
        this.y += this.vy * dt * config.timeScale;
        
        // 軌道を記録
        if (config.showTrails && performance.now() % 5 < 1) {
          this.trail.push({x: this.x, y: this.y});
          if (this.trail.length > this.trailMaxLength) {
            this.trail.shift();
          }
        }
        
        // 加速度をリセット（次のステップ用）
        this.ax = 0;
        this.ay = 0;
      }
      
      // 力を加える
      applyForce(fx, fy) {
        this.ax += fx / this.m;
        this.ay += fy / this.m;
      }
      
      // 描画メソッド
      draw(ctx) {
        // 軌道の描画
        if (config.showTrails && this.trail.length > 1) {
          ctx.beginPath();
          ctx.moveTo(this.trail[0].x, this.trail[0].y);
          
          for (let i = 1; i < this.trail.length; i++) {
            ctx.lineTo(this.trail[i].x, this.trail[i].y);
          }
          
          ctx.strokeStyle = this.isFragment 
            ? 'rgba(150, 150, 150, 0.3)' 
            : `rgba(${parseInt(this.color.slice(1, 3), 16)}, ${parseInt(this.color.slice(3, 5), 16)}, ${parseInt(this.color.slice(5, 7), 16)}, 0.4)`;
          ctx.lineWidth = 1.5;
          ctx.stroke();
        }
        
        // 惑星や恒星の描画
        if (this.type === 'star') {
          this.drawStar(ctx);
        } else {
          this.drawPlanet(ctx);
        }
      }
      
      drawPlanet(ctx) {
        // リングを描画（土星のような）
        if (this.rings.length > 0) {
          const angle = Math.atan2(SUN.y() - this.y, SUN.x() - this.x);
          const ringTilt = 0.3; // リングの傾き
          
          ctx.save();
          ctx.translate(this.x, this.y);
          ctx.rotate(angle);
          ctx.scale(1, Math.cos(ringTilt)); // 傾きの効果
          
          this.rings.forEach(ring => {
            ctx.beginPath();
            ctx.arc(0, 0, ring.outerRadius, 0, TAU);
            ctx.arc(0, 0, ring.innerRadius, 0, TAU, true);
            ctx.fillStyle = ring.color;
            ctx.fill();
          });
          
          ctx.restore();
        }
        
        // 惑星表面のグラデーション
        const grad = ctx.createRadialGradient(
          this.x, this.y, 0,
          this.x, this.y, this.r
        );
        grad.addColorStop(0, lightenColor(this.color, 40));
        grad.addColorStop(0.5, this.color);
        grad.addColorStop(0.8, darkenColor(this.color, 20));
        grad.addColorStop(1, darkenColor(this.color, 40));
        
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r, 0, TAU);
        ctx.fill();
        
        // ハイライト（光の反射）
        const sunAngle = Math.atan2(SUN.y() - this.y, SUN.x() - this.x);
        const highlightX = this.x + Math.cos(sunAngle) * (this.r * 0.5);
        const highlightY = this.y + Math.sin(sunAngle) * (this.r * 0.5);
        
        const highlight = ctx.createRadialGradient(
          highlightX, highlightY, 0,
          highlightX, highlightY, this.r * 0.6
        );
        highlight.addColorStop(0, 'rgba(255, 255, 255, 0.3)');
        highlight.addColorStop(1, 'rgba(255, 255, 255, 0)');
        
        ctx.fillStyle = highlight;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r, 0, TAU);
        ctx.fill();
      }
      
      drawStar(ctx) {
        const t = performance.now() * 0.002;
        const pulseFactor = 1 + 0.08 * Math.sin(t);
        const R = this.r * pulseFactor;
        
        // 基本の光のグラデーション
        const g = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, R * 2.5);
        g.addColorStop(0, '#fff');
        g.addColorStop(0.2, this.color);
        g.addColorStop(0.7, darkenColor(this.color, 30));
        g.addColorStop(1, 'rgba(0,0,0,0)');
        
        // 光のグロー効果
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.arc(this.x, this.y, R * 2.5, 0, TAU);
        ctx.fill();
        
        // 星のコア
        const coreGradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, R);
        coreGradient.addColorStop(0, '#fff');
        coreGradient.addColorStop(0.4, lightenColor(this.color, 50));
        coreGradient.addColorStop(0.8, this.color);
        coreGradient.addColorStop(1, darkenColor(this.color, 10));
        
        ctx.fillStyle = coreGradient;
        ctx.beginPath();
        ctx.arc(this.x, this.y, R, 0, TAU);
        ctx.fill();
        
        // 光のフレアを描画
        if (this.flares) {
          const time = performance.now() * 0.001;
          ctx.save();
          ctx.translate(this.x, this.y);
          
          this.flares.forEach(flare => {
            const pulseAmt = 0.7 + 0.3 * Math.sin(time + flare.phase);
            const flareLength = flare.length * pulseAmt;
            
            ctx.save();
            ctx.rotate(flare.angle + time * 0.1); // ゆっくり回転
            
            const flareGrad = ctx.createLinearGradient(0, 0, flareLength, 0);
            flareGrad.addColorStop(0, lightenColor(this.color, 80));
            flareGrad.addColorStop(0.5, lightenColor(this.color, 30));
            flareGrad.addColorStop(1, 'rgba(0,0,0,0)');
            
            ctx.fillStyle = flareGrad;
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.lineTo(flareLength, flare.width / 2);
            ctx.lineTo(flareLength, -flare.width / 2);
            ctx.closePath();
            ctx.fill();
            
            ctx.restore();
          });
          
          ctx.restore();
        }
      }
    }
    
    // 色操作のヘルパー関数
    function lightenColor(hex, percent) {
      const r = parseInt(hex.slice(1, 3), 16);
      const g = parseInt(hex.slice(3, 5), 16);
      const b = parseInt(hex.slice(5, 7), 16);
      
      const newR = Math.min(255, r + percent);
      const newG = Math.min(255, g + percent);
      const newB = Math.min(255, b + percent);
      
      return `rgb(${newR}, ${newG}, ${newB})`;
    }
    
    function darkenColor(hex, percent) {
      const r = parseInt(hex.slice(1, 3), 16);
      const g = parseInt(hex.slice(3, 5), 16);
      const b = parseInt(hex.slice(5, 7), 16);
      
      const newR = Math.max(0, r - percent);
      const newG = Math.max(0, g - percent);
      const newB = Math.max(0, b - percent);
      
      return `rgb(${newR}, ${newG}, ${newB})`;
    }
    
    // 中心の恒星
    const SUN = {
      x: () => 0,
      y: () => 0,
      m: 1e7,
      r: 35,
      draw() {
        const t = performance.now() * 0.002;
        const p = 1 + 0.08 * Math.sin(t);
        const R = this.r * p;
        
        // コロナ効果
        const corona = ctx.createRadialGradient(0, 0, R, 0, 0, R * 6);
        corona.addColorStop(0, 'rgba(255, 180, 100, 0.2)');
        corona.addColorStop(0.5, 'rgba(255, 150, 50, 0.1)');
        corona.addColorStop(1, 'rgba(255, 120, 50, 0)');
        
        ctx.fillStyle = corona;
        ctx.beginPath();
        ctx.arc(this.x(), this.y(), R * 6, 0, TAU);
        ctx.fill();
        
        // 表面のグラデーション
        const g = ctx.createRadialGradient(0, 0, 0, 0, 0, R);
        g.addColorStop(0, '#fff');
        g.addColorStop(0.4, '#fff6b5');
        g.addColorStop(0.8, '#ffca28');
        g.addColorStop(1, '#ff9800');
        
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.arc(this.x(), this.y(), R, 0, TAU);
        ctx.fill();
        
        // 恒星フレア
        const flareCount = 6;
        const time = performance.now() * 0.001;
        
        ctx.save();
        ctx.translate(0, 0);
        
        for (let i = 0; i < flareCount; i++) {
          const angle = (i / flareCount) * TAU + time * 0.2;
          const flareSize = R * (2 + Math.sin(time * 0.7 + i) * 0.5);
          
          ctx.save();
          ctx.rotate(angle);
          
          const flareGrad = ctx.createLinearGradient(0, 0, flareSize, 0);
          flareGrad.addColorStop(0, 'rgba(255, 255, 200, 0.8)');
          flareGrad.addColorStop(0.5, 'rgba(255, 180, 50, 0.4)');
          flareGrad.addColorStop(1, 'rgba(255, 100, 50, 0)');
          
          ctx.fillStyle = flareGrad;
          ctx.beginPath();
          ctx.moveTo(R * 0.8, 0);
          ctx.lineTo(flareSize, R * 0.4);
          ctx.lineTo(flareSize, -R * 0.4);
          ctx.closePath();
          ctx.fill();
          
          ctx.restore();
        }
        
        ctx.restore();
      }
    };
    
    function spawnPlanetSet() {
      const data = [
        {n:'水星', c:'#a9a9a9', m:3, r:3, d:70},
        {n:'金星', c:'#e0c16c', m:5, r:4, d:110},
        {n:'地球', c:'#4fc3f7', m:6, r:4.5, d:160},
        {n:'火星', c:'#ff7043', m:3, r:3.5, d:220},
        {n:'木星', c:'#fbc02d', m:190, r:8, d:330, hasBelt: true},
        {n:'土星', c:'#d1c4e9', m:95, r:7, d:430, hasBelt: true},
        {n:'天王星', c:'#80cbc4', m:14, r:6, d:530},
        {n:'海王星', c:'#bcaaa4', m:17, r:5.8, d:620}
      ];
      
      return data.map(p => {
        const ang = rand(0, TAU);
        const x = Math.cos(ang) * p.d;
        const y = Math.sin(ang) * p.d;
        const v = Math.sqrt(G * SUN.m / p.d);
        const vx = -Math.sin(ang) * v;
        const vy = Math.cos(ang) * v;
        
        return new Body({
          name: p.n,
          color: p.c,
          mass: p.m,
          radius: p.r,
          x, y, vx, vy,
          hasBelt: p.hasBelt || false
        });
      });
    }
    
    let bodies = spawnPlanetSet();
    let fragments = []; // 破片を別のリストに保存
    
    /*––––– FRAGMENTATION –––––*/
    function fragment(b1, b2) {
      const parts = 8; // より多くの破片
      const totalMass = b1.m + b2.m;
      const fragMass = totalMass / parts;
      const angleBase = Math.atan2(b1.y - b2.y, b1.x - b2.x);
      const collisionX = (b1.x + b2.x) / 2;
      const collisionY = (b1.y + b2.y) / 2;
      
      // 衝突エフェクト
      explosions.push({
        x: collisionX,
        y: collisionY,
        radius: Math.max(b1.r, b2.r) * 2,
        alpha: 1.0,
        color: '#fff',
        particles: Array(20).fill().map(() => ({
          x: 0,
          y: 0,
          vx: rand(-3, 3),
          vy: rand(-3, 3),
          size: rand(1, 3),
          life: 1.0
        }))
      });
      
      // 破片生成
      for (let i = 0; i < parts; i++) {
        const ang = angleBase + rand(-1, 1);
        const speed = rand(1, 4);
        const size = Math.sqrt(fragMass) * rand(0.5, 1.5);
        
        fragments.push(new Body({
          color: rand(0, 1) > 0.5 ? b1.color : b2.color,
          mass: fragMass,
          radius: size,
          x: collisionX,
          y: collisionY,
          vx: Math.cos(ang) * speed,
          vy: Math.sin(ang) * speed
        }));
      }
      
      addLog(`⚠️ ${b1.name || 'Fragment'} と ${b2.name || 'Fragment'} が衝突し破片化`);
    }
    
    /*––––– EXPLOSION EFFECTS –––––*/
    const explosions = [];
    
    function updateExplosions(dt) {
      for (let i = explosions.length - 1; i >= 0; i--) {
        const exp = explosions[i];
        exp.alpha -= 0.02 * dt;
        exp.radius += 2 * dt;
        
        exp.particles.forEach(p => {
          p.x += p.vx * dt;
          p.y += p.vy * dt;
          p.life -= 0.03 * dt;
        });
        
        if (exp.alpha <= 0) {
          explosions.splice(i, 1);
        }
      }
    }
    
    function drawExplosions() {
      explosions.forEach(exp => {
        // 爆発のグロー効果
        const glow = ctx.createRadialGradient(
          exp.x, exp.y, 0,
          exp.x, exp.y, exp.radius
        );
        glow.addColorStop(0, `rgba(255, 220, 100, ${exp.alpha * 0.8})`);
        glow.addColorStop(0.4, `rgba(255, 100, 50, ${exp.alpha * 0.5})`);
        glow.addColorStop(1, `rgba(200, 50, 20, 0)`);
        
        ctx.fillStyle = glow;
        ctx.beginPath();
        ctx.arc(exp.x, exp.y, exp.radius, 0, TAU);
        ctx.fill();
        
        // 飛び散る破片
        ctx.save();
        ctx.translate(exp.x, exp.y);
        
        exp.particles.forEach(p => {
          if (p.life > 0) {
            ctx.fillStyle = `rgba(255, 200, 100, ${p.life})`;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size, 0, TAU);
            ctx.fill();
          }
        });
        
        ctx.restore();
      });
    }
    
    /*––––– IMPROVED PHYSICS SIMULATION –––––*/
    function calculateForces(bodies, fragments) {
      // 重力作用の計算（Verlet積分法）
      // 中心恒星からの引力
      const allBodies = [...bodies, ...fragments];
      
      for (let i = 0; i < allBodies.length; i++) {
        const b = allBodies[i];
        
        // 中心の恒星からの重力
        const dx = SUN.x() - b.x;
        const dy = SUN.y() - b.y;
        const distSq = dx * dx + dy * dy;
        const dist = Math.sqrt(distSq);
        
        // 距離が近すぎる場合は力を制限（数値安定性のため）
        const safeDist = Math.max(dist, b.r * 2);
        const f = G * SUN.m / (safeDist * safeDist);
        
        b.applyForce(f * dx / dist, f * dy / dist);
        
        // 他の天体との相互引力を計算
        for (let j = i + 1; j < allBodies.length; j++) {
          const bj = allBodies[j];
          
          const dx2 = bj.x - b.x;
          const dy2 = bj.y - b.y;
          const distSq2 = dx2 * dx2 + dy2 * dy2;
          const dist2 = Math.sqrt(distSq2);
          
          // 衝突判定
          if (dist2 < b.r + bj.r) {
            // 両方とも名前付き天体（惑星）なら破片化
            if (b.name && bj.name) {
              fragment(b, bj);
              b.alive = false;
              bj.alive = false;
            } 
            // 片方だけが命名された天体なら質量を合成（小さな破片の吸収）
            else if (b.name) {
              b.m += bj.m;
              b.r = Math.pow(b.r * b.r * b.r + bj.r * bj.r * bj.r, 1/3); // 体積保存的な半径計算
              bj.alive = false;
              addLog(`${b.name} が破片を吸収`);
            }
            else if (bj.name) {
              bj.m += b.m;
              bj.r = Math.pow(bj.r * bj.r * bj.r + b.r * b.r * b.r, 1/3);
              b.alive = false;
              addLog(`${bj.name} が破片を吸収`);
            }
            // 両方とも破片なら、大きい方が小さい方を吸収
            else if (b.m > bj.m) {
              b.m += bj.m;
              b.r = Math.pow(b.r * b.r * b.r + bj.r * bj.r * bj.r, 1/3);
              bj.alive = false;
            } else {
              bj.m += b.m;
              bj.r = Math.pow(bj.r * bj.r * bj.r + b.r * b.r * b.r, 1/3);
              b.alive = false;
            }
            continue;
          }
          
          // 重力の計算
          const f2 = G * b.m * bj.m / distSq2;
          const fx = f2 * dx2 / dist2;
          const fy = f2 * dy2 / dist2;
          
          // 力の適用（作用・反作用）
          b.applyForce(fx, fy);
          bj.applyForce(-fx, -fy);
        }
      }
    }
    
    /*––––– DISTANCE AND CELESTIAL MECHANICS HELPERS –––––*/
    function getOrbitalParameters(body) {
      // 軌道要素の計算 (簡易版)
      const dx = body.x - SUN.x();
      const dy = body.y - SUN.y();
      const r = Math.sqrt(dx*dx + dy*dy);
      const v = Math.sqrt(body.vx*body.vx + body.vy*body.vy);
      
      // 軌道エネルギー
      const energy = 0.5 * v*v - G * SUN.m / r;
      
      // 軌道の種類
      let orbitType;
      if (energy < 0) {
        // 角運動量ベクトル
        const angMomentum = r * v;
        
        // 離心率
        const ecc = Math.sqrt(1 + 2 * energy * angMomentum * angMomentum / (G * SUN.m) ** 2);
        
        if (ecc < 0.01) orbitType = "円軌道";
        else if (ecc < 0.1) orbitType = "ほぼ円軌道";
        else if (ecc < 0.3) orbitType = "楕円軌道";
        else orbitType = "高離心率楕円軌道";
      } else if (Math.abs(energy) < 0.001) {
        orbitType = "放物線軌道";
      } else {
        orbitType = "双曲線軌道";
      }
      
      return {
        distance: r,
        velocity: v,
        orbitType
      };
    }

    cvs.addEventListener('mousemove', (e) => {

        // 視点のパン
        offsetX += (e.clientX - lastMouseX) / scale;

      }
      
      // マウス位置を世界座標に変換
      const mouseWorldX = (e.clientX - CX) / scale - offsetX;
      const mouseWorldY = (e.clientY - CY) / scale - offsetY;
      
      // 天体の検出（ホバー）
      let closest = null;
      let minDist = Infinity;
      
      for (const body of bodies) {
        const dx = body.x - mouseWorldX;
        const dy = body.y - mouseWorldY;
        const dist = Math.sqrt(dx * dx + dy * dy);
        
        if (dist < Math.max(body.r * 2, 20) && dist < minDist) {

      }
      
      // ツールチップの更新
      if (closest) {

      const dy = y - SUN.y();
      const distance = Math.sqrt(dx * dx + dy * dy);
      
      // 軌道速度の計算
      const angle = Math.atan2(dy, dx);
      const v = Math.sqrt(G * SUN.m / distance);
      
      // 接線方向の速度ベクトル
      const vx = -Math.sin(angle) * v;
      const vy = Math.cos(angle) * v;
      
      bodies.push(new Body({
        name: `惑星-${bodies.length + 1}`,

      }));
      
      addLog(`🪐 ダブルクリックで惑星を追加しました`);
    });
    
    // ★★★ ここから流れ星の実装を追加 ★★★
    
    // 流れ星のリスト
    const meteors = [];
    
    // 流れ星を生成する関数
    function spawnMeteor() {
      // 画面上部のランダムな位置から斜め下に流れる
      const startX = rand(0, W);
      const startY = rand(-100, 0);
      const angle = rand(Math.PI * 0.65, Math.PI * 0.95); // 斜め下向き
      const speed = rand(12, 22);
      meteors.push({
        x: startX,
        y: startY,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        len: rand(80, 180),
        alpha: 1.0,
        width: rand(2, 3.5),
        color: 'rgba(255,255,200,'
      });
    }
    
    // 流れ星を描画・更新
    function updateAndDrawMeteors(dt) {
      for (let i = meteors.length - 1; i >= 0; i--) {
        const m = meteors[i];
        m.x += m.vx * dt;
        m.y += m.vy * dt;
        m.alpha -= 0.012 * dt;
        if (m.alpha <= 0 || m.x < -200 || m.x > W + 200 || m.y > H + 200) {
          meteors.splice(i, 1);
          continue;
        }
        // 描画
        ctx.save();
        ctx.globalAlpha = m.alpha;
        ctx.strokeStyle = m.color + m.alpha + ')';
        ctx.lineWidth = m.width;
        ctx.beginPath();
        ctx.moveTo(m.x, m.y);
        ctx.lineTo(m.x - m.vx * (m.len / 20), m.y - m.vy * (m.len / 20));
        ctx.stroke();
        ctx.restore();
      }
    }
    
    // 一定確率で流れ星を発生させる
    setInterval(() => {

    }, 900);
    
    // ★★★ ここまで流れ星の実装を追加 ★★★
    
    /*––––– MAIN LOOP –––––*/
    let last = performance.now();
    function loop(now) {
      const dt = Math.min((now - last) / 16, 3);
      last = now;
      
      ctx.clearRect(0, 0, W, H);
      
      // 背景
      drawBackground();
      drawBackgroundStars(now);
      
      // 流れ星を描画
      updateAndDrawMeteors(dt);
      
      // 削除: 銀河系のディスク描画は不要
      
      // 太陽（常に中心）
      ctx.save();
      ctx.translate(CX, CY);
      ctx.scale(scale, scale);
      ctx.translate(offsetX, offsetY);
      SUN.draw();
      ctx.restore();
      
      // 物理計算
      calculateForces(bodies, fragments);
      
      // 位置更新
      [...bodies, ...fragments].forEach(b => b.update(dt));
      
      // 破片や爆発の更新
      updateExplosions(dt);
      
      // 追跡中の天体がある場合はその位置に視点を合わせる
      if (selectedBody && selectedBody.alive) {
        offsetX = -selectedBody.x;
        offsetY = -selectedBody.y;
      }
      
      // 描画
      ctx.save();
      ctx.translate(CX, CY);
      ctx.scale(scale, scale);
      ctx.translate(offsetX, offsetY);
      
      // 先に爆発エフェクトを描画
      drawExplosions();
      
      // 天体描画
      [...bodies, ...fragments].forEach(b => {
        if (b.alive) b.draw(ctx);
      });
      
      ctx.restore();
      
      // 生存していない天体の削除
      bodies = bodies.filter(b => b.alive);
      fragments = fragments.filter(b => b.alive);
      
      // 画面外に出た破片を削除（最適化）
      const margin = 2000; // 余裕を持たせる
      fragments = fragments.filter(f => {
        const dx = f.x - SUN.x();
        const dy = f.y - SUN.y();
        return dx * dx + dy * dy < margin * margin;
      });
      
      // 統計情報の表示
      stats.textContent = `天体数: ${bodies.length} | 破片数: ${fragments.length} | FPS: ${(1000 / dt / 16).toFixed(0)}`;
      
      requestAnimationFrame(loop);
    }
    
    addLog('🌌 太陽系シミュレーション開始 - マウスドラッグでパン、ホイールでズーム');
    requestAnimationFrame(loop);

    function normalizeAngle(angle) {
      return ((angle % TAU) + TAU) % TAU;
    }

    function solveKepler(M, e) {
      let E = M;
      for (let i = 0; i < 50; i++) {
        const f = E - e * Math.sin(E) - M;
        const fp = 1 - e * Math.cos(E);
        const delta = f / fp;
        E -= delta;
        if (Math.abs(delta) < 1e-10) break;
      }
      return E;
    }

    function computeOrbit(planet, years) {
      const M = normalizeAngle(planet.L_rad + planet.Lrate_rad * years - planet.w_rad);
      const E = solveKepler(M, planet.e);
      const nu = 2 * Math.atan2(
        Math.sqrt(1 + planet.e) * Math.sin(E / 2),
        Math.sqrt(1 - planet.e) * Math.cos(E / 2)
      );
      const r = planet.a * (1 - planet.e * Math.cos(E));
      return {
        x: r * Math.cos(nu + planet.w_rad),
        y: -r * Math.sin(nu + planet.w_rad),
        r
      };

    function drawOrbitPath(planet) {
      const a_px = planet.a * baseScale;
      const b_px = a_px * Math.sqrt(1 - planet.e * planet.e);
      const focus = a_px * planet.e;
      const centerX = -focus * Math.cos(planet.w_rad);
      const centerY = focus * Math.sin(planet.w_rad);
      ctx.beginPath();
      ctx.ellipse(centerX, centerY, a_px, b_px, planet.w_rad, 0, TAU);
      ctx.strokeStyle = 'rgba(180, 200, 240, 0.18)';
      ctx.lineWidth = 1 / zoom;
      ctx.stroke();
    }

    function drawPlanet(planet, pos) {
      const px = pos.x * baseScale;
      const py = pos.y * baseScale;
      if (config.showTrails && planet.trail.length > 1) {
        ctx.beginPath();
        ctx.moveTo(planet.trail[0].x * baseScale, planet.trail[0].y * baseScale);
        for (let i = 1; i < planet.trail.length; i++) {
          ctx.lineTo(planet.trail[i].x * baseScale, planet.trail[i].y * baseScale);
        }
        ctx.strokeStyle = 'rgba(210, 230, 255, 0.35)';
        ctx.lineWidth = 1 / zoom;
        ctx.stroke();
      }
      ctx.save();
      ctx.translate(px, py);
      const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, planet.radius_px * 2);
      grad.addColorStop(0, '#ffffff');
      grad.addColorStop(0.2, planet.color);
      grad.addColorStop(1, darkenColor(planet.color, 40));
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(0, 0, planet.radius_px, 0, TAU);
      ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.25)';
      ctx.beginPath();
      ctx.arc(-planet.radius_px * 0.25, -planet.radius_px * 0.18, planet.radius_px * 0.36, 0, TAU);
      ctx.fill();
      if (planet.hasRing) {
        ctx.save();
        ctx.rotate(-0.4);
        ctx.scale(1, 0.28);
        ctx.strokeStyle = 'rgba(210, 190, 150, 0.6)';
        ctx.lineWidth = 1.2 / zoom;
        ctx.beginPath();
        ctx.ellipse(0, 0, planet.radius_px * 3.8, planet.radius_px * 1.1, 0, 0, TAU);
        ctx.stroke();
        ctx.restore();
      }
      ctx.restore();
    }

    function createPlanets() {
      const data = [
        {name:'水星', color:'#a9a9a9', a:0.387, e:0.2056, L:252.25, Lrate:1494.70, w:77.45, radius_px:4},
        {name:'金星', color:'#e0c16c', a:0.723, e:0.0068, L:181.98, Lrate:585.17, w:131.56, radius_px:5},
        {name:'地球', color:'#4fc3f7', a:1.000, e:0.0167, L:100.46, Lrate:360.00, w:102.94, radius_px:5},
        {name:'火星', color:'#ff7043', a:1.524, e:0.0934, L:355.45, Lrate:191.41, w:336.04, radius_px:4},
        {name:'木星', color:'#fbc02d', a:5.204, e:0.0489, L:34.40, Lrate:30.69, w:14.75, radius_px:8},
        {name:'土星', color:'#d1c4e9', a:9.582, e:0.0565, L:49.95, Lrate:12.44, w:92.86, radius_px:7, hasRing:true},
        {name:'天王星', color:'#80cbc4', a:19.218, e:0.0464, L:313.23, Lrate:7.48, w:170.96, radius_px:5},
        {name:'海王星', color:'#bcaaa4', a:30.110, e:0.0092, L:304.88, Lrate:5.43, w:44.97, radius_px:5}
      ];
      return data.map(p => ({
        ...p,
        w_rad: p.w * deg2rad,
        L_rad: p.L * deg2rad,
        Lrate_rad: p.Lrate * deg2rad,
        trail: [],
        hasRing: p.hasRing || false
      }));
    }

    const bodies = createPlanets();
    let last = performance.now();

    function formatTimeLabel(value) {
      return `${value.toFixed(1)} 日/sec`;
    }

    function worldFromMouse(e) {
      const rect = cvs.getBoundingClientRect();
      const mx = e.clientX - rect.left;
      const my = e.clientY - rect.top;
      return {
        x: (mx - CX - panX) / zoom / baseScale,
        y: (my - CY - panY) / zoom / baseScale
      };
    }

    function updateTrails(planet, pos) {
      planet.trail.push({x: pos.x, y: pos.y});
      if (planet.trail.length > 120) planet.trail.shift();
    }

    resetBtn.addEventListener('click', () => {
      simTimeDays = 0;
      timeScale = 1;
      zoom = 1;
      panX = 0;
      panY = 0;
      timeSpeed.value = 1;
      timeValue.textContent = '1.0 日/sec';
      zoomLevel.value = 1;
      zoomValue.textContent = '1.0x';
      bodies.forEach(p => p.trail = []);
      addLog('🔄 太陽系シミュレーションをリセットしました');
    });

    addPlanetBtn.addEventListener('click', () => {
      const a = rand(0.7, 15);
      const e = rand(0, 0.25);
      const w = rand(0, 360);
      const L = rand(0, 360);
      const Lrate = 360 / Math.pow(a, 1.5);
      bodies.push({
        name: `惑星-${bodies.length + 1}`,
        color: `hsl(${rand(0, 360)}, 70%, 60%)`,
        a,
        e,
        L,
        Lrate,
        w,
        w_rad: w * deg2rad,
        L_rad: L * deg2rad,
        Lrate_rad: Lrate * deg2rad,
        radius_px: rand(3, 6),
        trail: [],
        hasRing: false
      });
      addLog('🪐 新しい惑星を追加しました');
    });

    addStarBtn.addEventListener('click', () => {
      const a = rand(6, 25);
      const e = rand(0.0, 0.2);
      const w = rand(0, 360);
      const L = rand(0, 360);
      const Lrate = 360 / Math.pow(a, 1.5);
      bodies.push({
        name: `彗星-${bodies.length + 1}`,
        color: '#ffd880',
        a,
        e,
        L,
        Lrate,
        w,
        w_rad: w * deg2rad,
        L_rad: L * deg2rad,
        Lrate_rad: Lrate * deg2rad,
        radius_px: rand(4, 7),
        trail: [],
        hasRing: false
      });
      addLog('⭐ 新しい彗星を追加しました');
    });

    toggleTrailBtn.addEventListener('click', () => {
      config.showTrails = !config.showTrails;
      toggleTrailBtn.textContent = config.showTrails ? '軌道非表示' : '軌道表示';
      addLog(`${config.showTrails ? '✓' : '✗'} 軌道表示を${config.showTrails ? 'オン' : 'オフ'}にしました`);
    });

    timeSpeed.addEventListener('input', () => {
      timeScale = parseFloat(timeSpeed.value);
      timeValue.textContent = formatTimeLabel(timeScale);
    });

    zoomLevel.addEventListener('input', () => {
      zoom = parseFloat(zoomLevel.value);
      zoomValue.textContent = `${zoom.toFixed(1)}x`;
    });

    cvs.addEventListener('mousedown', (e) => {
      dragging = true;
      lastMouseX = e.clientX;
      lastMouseY = e.clientY;
    });

    cvs.addEventListener('mouseup', () => {
      dragging = false;
    });

    cvs.addEventListener('mouseleave', () => {
      dragging = false;
      hoveredBody = null;
      tooltip.style.opacity = 0;
    });

    cvs.addEventListener('mousemove', (e) => {
      if (dragging) {
        panX += e.clientX - lastMouseX;
        panY += e.clientY - lastMouseY;
        lastMouseX = e.clientX;
        lastMouseY = e.clientY;
      }
      const world = worldFromMouse(e);
      let closest = null;
      let minDist = Infinity;
      const years = simTimeDays / 365.25;
      bodies.forEach(planet => {
        const pos = computeOrbit(planet, years);
        const dx = pos.x - world.x;
        const dy = pos.y - world.y;
        const dist = Math.sqrt(dx * dx + dy * dy) * baseScale;
        if (dist < Math.max(planet.radius_px * 2, 18) && dist < minDist) {
          minDist = dist;
          closest = {planet, pos};
        }
      });
      if (closest) {
        hoveredBody = closest;
        tooltip.style.opacity = 1;
        tooltip.style.left = `${e.clientX + 15}px`;
        tooltip.style.top = `${e.clientY + 15}px`;
        tooltip.innerHTML = `\n          <strong>${closest.planet.name}</strong><br>\n          a: ${closest.planet.a.toFixed(3)} AU<br>\n          e: ${closest.planet.e.toFixed(4)}<br>\n          現在距離: ${Math.sqrt(closest.pos.x * closest.pos.x + closest.pos.y * closest.pos.y).toFixed(3)} AU\n        `;
      } else {
        hoveredBody = null;
        tooltip.style.opacity = 0;
      }
    });

    cvs.addEventListener('wheel', (e) => {
      e.preventDefault();
      const zoomFactor = e.deltaY > 0 ? 0.9 : 1.1;
      zoom *= zoomFactor;
      zoom = Math.max(0.1, Math.min(10, zoom));
      zoomLevel.value = zoom;
      zoomValue.textContent = `${zoom.toFixed(1)}x`;
    });

    cvs.addEventListener('click', () => {
      if (hoveredBody) {
        selectedBody = hoveredBody.planet;
        addLog(`${selectedBody.name} を選択しました`);
      }
    });

    cvs.addEventListener('dblclick', (event) => {
      const world = worldFromMouse(event);
      const a = Math.max(0.2, Math.min(30, Math.sqrt(world.x * world.x + world.y * world.y)));
      const ecc = rand(0, 0.2);
      const w = rand(0, 360);
      const L = rand(0, 360);
      const Lrate = 360 / Math.pow(a, 1.5);
      bodies.push({
        name: `惑星-${bodies.length + 1}`,
        color: `hsl(${rand(0, 360)}, 70%, 60%)`,
        a,
        e: ecc,
        L,
        Lrate,
        w,
        w_rad: w * deg2rad,
        L_rad: L * deg2rad,
        Lrate_rad: Lrate * deg2rad,
        radius_px: rand(3, 6),
        trail: [],
        hasRing: false
      });
      addLog('🪐 ダブルクリックで惑星を追加しました');
    });

    function updateStats() {
      const year = 2000 + simTimeDays / 365.25;
      stats.textContent = `年: ${year.toFixed(3)} | 日数: ${simTimeDays.toFixed(1)} | 惑星: ${bodies.length}`;
    }

    function loop(now) {
      const rawDt = (now - last) / 1000;
      const dt = Math.min(rawDt, 0.05);
      last = now;
      simTimeDays += dt * timeScale;
      const years = simTimeDays / 365.25;
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      ctx.clearRect(0, 0, W, H);
      drawBackground();
      ctx.setTransform(zoom, 0, 0, zoom, CX + panX, CY + panY);
      drawSun();
      bodies.forEach(planet => {
        if (config.showOrbits) drawOrbitPath(planet);
      });
      bodies.forEach(planet => {
        const pos = computeOrbit(planet, years);
        if (config.showTrails) updateTrails(planet, pos);
        drawPlanet(planet, pos);
      });
      updateStats();
      requestAnimationFrame(loop);
    }

    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();
    addLog('🌌 太陽系シミュレーション開始 - マウスドラッグでパン、ホイールでズーム');
    requestAnimationFrame(loop);
  </script>
</body>
